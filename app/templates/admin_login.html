{% extends "base.html" %}
{% block title %}Admin — Odoo Pulse{% endblock %}
{% block body %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
  <div style="width:100%; max-width:380px; padding:1.5rem;">
    <div style="text-align:center; margin-bottom:2rem;">
      <span class="nav-brand" style="font-size:1.5rem;">Odoo Pulse</span>
      <p class="text-muted text-sm" style="margin-top:0.5rem;">Panel de administración</p>
    </div>
    <div class="card">
      <div id="alert"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="margin-top:0.5rem;">
          Entrar
        </button>
      </form>
    </div>
  </div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  const data = { email: e.target.email.value, password: e.target.password.value };
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
    });
    if (res.ok) {
      window.location.href = '/admin/dashboard';
    } else {
      document.getElementById('alert').innerHTML = '<div class="alert alert-error">Credenciales incorrectas</div>';
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  } catch(err) {
    document.getElementById('alert').innerHTML = '<div class="alert alert-error">Error de red</div>';
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
});
</script>
{% endblock %}
