services:
  - type: web
    name: odoo-pulse
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: odoo-pulse-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENCRYPTION_MASTER_KEY
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFICATION_EMAIL
        value: germanroobles@gmail.com
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_URL
        sync: false

databases:
  - name: odoo-pulse-db
    databaseName: odoo_pulse
    user: odoo_pulse
